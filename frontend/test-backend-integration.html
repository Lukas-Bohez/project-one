<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Integration Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .test-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            border-left: 4px solid #4CAF50;
        }
        .test-section h2 {
            margin-top: 0;
            color: #4CAF50;
        }
        input, button {
            padding: 12px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
        }
        input {
            width: 200px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        button {
            background: #4CAF50;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .output {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            margin-top: 10px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .success {
            color: #4CAF50;
            font-weight: bold;
        }
        .error {
            color: #f44336;
            font-weight: bold;
        }
        .info {
            color: #2196F3;
        }
        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 3px;
            margin-left: 10px;
            font-size: 12px;
        }
        .status.authenticated {
            background: #4CAF50;
        }
        .status.not-authenticated {
            background: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Backend Integration Test</h1>
        
        <div class="test-section">
            <h2>Status Check</h2>
            <button onclick="checkStatus()">Check Backend Status</button>
            <div id="statusOutput" class="output"></div>
        </div>

        <div class="test-section">
            <h2>🔐 Authentication
                <span id="authStatus" class="status not-authenticated">Not Authenticated</span>
            </h2>
            
            <div>
                <h3>Register</h3>
                <input type="text" id="regUsername" placeholder="Username (min 3 chars)">
                <input type="password" id="regPassword" placeholder="Password (min 8 chars)">
                <input type="email" id="regEmail" placeholder="Email (optional)">
                <button onclick="testRegister()">Register</button>
            </div>
            
            <div style="margin-top: 20px;">
                <h3>Login</h3>
                <input type="text" id="loginUsername" placeholder="Username">
                <input type="password" id="loginPassword" placeholder="Password">
                <button onclick="testLogin()">Login</button>
                <button onclick="testLogout()">Logout</button>
            </div>
            
            <div id="authOutput" class="output"></div>
        </div>

        <div class="test-section">
            <h2>💾 Save & Load</h2>
            <button onclick="testSave()">Test Save</button>
            <button onclick="testLoad()">Test Load</button>
            <div id="saveLoadOutput" class="output"></div>
        </div>

        <div class="test-section">
            <h2>🏆 Leaderboard</h2>
            <button onclick="testLeaderboard()">Get Leaderboard</button>
            <div id="leaderboardOutput" class="output"></div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const API_ENDPOINT = '/api/v1/game';
        let authToken = null;

        function log(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            const timestamp = new Date().toLocaleTimeString();
            const colorClass = type === 'success' ? 'success' : type === 'error' ? 'error' : 'info';
            element.innerHTML += `<div class="${colorClass}">[${timestamp}] ${message}</div>`;
            element.scrollTop = element.scrollHeight;
        }

        function updateAuthStatus(authenticated) {
            const statusEl = document.getElementById('authStatus');
            if (authenticated) {
                statusEl.textContent = 'Authenticated ✓';
                statusEl.className = 'status authenticated';
            } else {
                statusEl.textContent = 'Not Authenticated';
                statusEl.className = 'status not-authenticated';
            }
        }

        async function checkStatus() {
            log('statusOutput', 'Checking backend status...', 'info');
            try {
                const response = await fetch(`${API_BASE}${API_ENDPOINT}/status`);
                const data = await response.json();
                log('statusOutput', JSON.stringify(data, null, 2), 'success');
            } catch (error) {
                log('statusOutput', `Error: ${error.message}`, 'error');
            }
        }

        async function testRegister() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const email = document.getElementById('regEmail').value || `${username}@game.local`;
            
            if (!username || !password) {
                log('authOutput', 'Please enter username and password', 'error');
                return;
            }

            log('authOutput', `Registering user: ${username}`, 'info');
            
            try {
                const response = await fetch(`${API_BASE}${API_ENDPOINT}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.access_token;
                    updateAuthStatus(true);
                    log('authOutput', `✅ Registration successful! Token: ${authToken.substring(0, 20)}...`, 'success');
                    log('authOutput', `User ID: ${data.user_id}`, 'success');
                } else {
                    log('authOutput', `❌ Registration failed: ${data.detail}`, 'error');
                }
            } catch (error) {
                log('authOutput', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function testLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                log('authOutput', 'Please enter username and password', 'error');
                return;
            }

            log('authOutput', `Logging in user: ${username}`, 'info');
            
            try {
                const response = await fetch(`${API_BASE}${API_ENDPOINT}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.access_token;
                    updateAuthStatus(true);
                    log('authOutput', `✅ Login successful! Token: ${authToken.substring(0, 20)}...`, 'success');
                    log('authOutput', `User ID: ${data.user_id}`, 'success');
                    
                    // Auto-load after login
                    setTimeout(testLoad, 500);
                } else {
                    log('authOutput', `❌ Login failed: ${data.detail}`, 'error');
                }
            } catch (error) {
                log('authOutput', `❌ Error: ${error.message}`, 'error');
            }
        }

        function testLogout() {
            authToken = null;
            updateAuthStatus(false);
            log('authOutput', '📤 Logged out', 'info');
        }

        async function testSave() {
            if (!authToken) {
                log('saveLoadOutput', '⚠️ Please login first', 'error');
                return;
            }

            log('saveLoadOutput', 'Saving test data...', 'info');
            
            // Create test save data
            const saveData = {
                save_data: {
                    game_version: "1.0.0",
                    play_time: Math.floor(Math.random() * 10000),
                    last_save: new Date().toISOString(),
                    resources: {
                        stone: Math.floor(Math.random() * 1000),
                        coal: Math.floor(Math.random() * 500),
                        iron: Math.floor(Math.random() * 300),
                        silver: Math.floor(Math.random() * 200),
                        gold: Math.floor(Math.random() * 100),
                        crystals: Math.floor(Math.random() * 50),
                        royal_favor: 0
                    },
                    custom_data: {
                        workers: { stone_miners: 5, coal_miners: 3 },
                        city: { banks: 2, markets: 1 }
                    },
                    prestige_level: Math.floor(Math.random() * 10),
                    characters: [],
                    buildings: {},
                    upgrades: { miner_level: 1, transport_level: 1, market_level: 1, storage_level: 1 },
                    unlocked_vehicles: ["hand_cart"],
                    achievements: [],
                    offline_time: 0,
                    settings: { sound_enabled: true, auto_save: true, notifications: true, graphics_quality: "high" }
                },
                backup: false
            };
            
            try {
                const response = await fetch(`${API_BASE}${API_ENDPOINT}/save`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(saveData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    log('saveLoadOutput', '✅ Save successful!', 'success');
                    log('saveLoadOutput', JSON.stringify(data, null, 2), 'success');
                } else {
                    log('saveLoadOutput', `❌ Save failed: ${data.detail}`, 'error');
                }
            } catch (error) {
                log('saveLoadOutput', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function testLoad() {
            if (!authToken) {
                log('saveLoadOutput', '⚠️ Please login first', 'error');
                return;
            }

            log('saveLoadOutput', 'Loading save data...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}${API_ENDPOINT}/save`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    if (data.has_save) {
                        log('saveLoadOutput', '✅ Load successful!', 'success');
                        log('saveLoadOutput', `Resources: Stone=${data.save_data.resources.stone}, Gold=${data.save_data.resources.gold}`, 'success');
                        log('saveLoadOutput', `Prestige Level: ${data.save_data.prestige_level}`, 'success');
                        log('saveLoadOutput', `Last Updated: ${data.last_updated}`, 'info');
                    } else {
                        log('saveLoadOutput', '🎮 No save found - starting fresh', 'info');
                    }
                } else {
                    log('saveLoadOutput', `❌ Load failed: ${data.detail}`, 'error');
                }
            } catch (error) {
                log('saveLoadOutput', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function testLeaderboard() {
            if (!authToken) {
                log('leaderboardOutput', '⚠️ Please login first', 'error');
                return;
            }

            log('leaderboardOutput', 'Fetching leaderboard...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}${API_ENDPOINT}/leaderboard?limit=10`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    log('leaderboardOutput', '✅ Leaderboard loaded!', 'success');
                    log('leaderboardOutput', `Total Players: ${data.total_players}`, 'info');
                    log('leaderboardOutput', `Your Rank: ${data.user_rank || 'Not ranked'}`, 'info');
                    
                    data.entries.forEach((entry, index) => {
                        log('leaderboardOutput', 
                            `${index + 1}. ${entry.username} - Score: ${entry.total_score} (Stone: ${entry.stone_count}, Gold: ${entry.gold_count}, Prestige: ${entry.prestige_level})`,
                            'success'
                        );
                    });
                } else {
                    log('leaderboardOutput', `❌ Failed: ${data.detail}`, 'error');
                }
            } catch (error) {
                log('leaderboardOutput', `❌ Error: ${error.message}`, 'error');
            }
        }

        // Check status on load
        window.onload = () => {
            log('statusOutput', 'Test page loaded. Click "Check Backend Status" to begin.', 'info');
        };
    </script>
</body>
</html>
