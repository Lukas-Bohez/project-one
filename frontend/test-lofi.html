<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lofi Player Test</title>
</head>
<body>
    <h1>Lofi Player Test</h1>
    <div id="debug-info"></div>
    
    <script src="js/lofi.js"></script>
    <script>
        // Debug information
        setTimeout(() => {
            const debugInfo = document.getElementById('debug-info');
            debugInfo.innerHTML = `
                <h2>Debug Info:</h2>
                <p>Song list length: ${songList.length}</p>
                <p>Songs: ${songList.join(', ')}</p>
                <p>Is playing: ${isPlaying}</p>
                <p>Config: ${JSON.stringify(config, null, 2)}</p>
            `;
        }, 2000);
    </script>
</body>
</html>
