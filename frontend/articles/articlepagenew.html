<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8418485814964449" crossorigin="anonymous"></script>
  <title>Articles • Quiz The Spire</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="../js/themeManager.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/marked/marked.min.js"></script>
  <style>
    /* Minimal page chrome to integrate with site theme */
    body{min-height:100vh;display:flex;flex-direction:column}
    header.a-header .back {position:absolute;right:1rem;top:50%;transform:translateY(-50%);}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  </style>
</head>
<body>
  <header class="a-header">
    <div class="a-container a-topbar" style="justify-content: space-between;">
      <a class="c-btn c-btn--tertiary" href="../index.html">← Quiz The Spire</a>
      <h1 class="a-topbar__title" style="flex: 1; text-align: center;">Latest Artikels by Oroka Conner</h1>
      <button id="servoTestBtn" class="c-btn c-btn--tertiary gamepad">Toggle Theme</button>
    </div>
  </header>
  
  <main class="a-container">
    <!-- Search and Filter Toolbar -->
    <div class="a-toolbar">
      <input 
        type="text" 
        id="search-input" 
        class="a-input" 
        placeholder="Search articles..." 
        aria-label="Search articles"
      />
      <select id="category-filter" class="a-select" aria-label="Filter by category">
        <option value="all">All Categories</option>
      </select>
      <select id="sort-select" class="a-select" aria-label="Sort articles">
        <option value="date-desc">Newest First</option>
        <option value="date-asc">Oldest First</option>
        <option value="title">Alphabetical</option>
      </select>
    </div>

    <!-- Articles Container -->
    <div id="articles-container">
      <div style="text-align: center; padding: 3rem; color: var(--ink-muted);">
        <div class="loading-spinner" style="margin: 0 auto 1rem; width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p>Loading articles...</p>
      </div>
    </div>

    <noscript>
      <div class="callout info">
        <strong>JavaScript Required:</strong> Please enable JavaScript to view the articles. This page uses dynamic loading to provide the best experience.
      </div>
    </noscript>
  </main>

  <footer class="a-footer a-container"></footer>

  <script src="js/imageProvider.js"></script>
  <script src="js/articles.js"></script>
  <script src="../js/lofi.js"></script>
</body>
</html>
