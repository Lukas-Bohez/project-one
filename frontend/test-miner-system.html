<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Miner System</title>
</head>
<body>
    <div id="test-results">
        <h2>Miner System Test</h2>
        <p id="status">Initializing...</p>
        <div id="details"></div>
    </div>

    <!-- Load game scripts -->
    <script src="idleGame/js/config.js"></script>
    <script src="idleGame/js/characterSystem.js"></script>
    
    <script>
        // Test the miner system
        function testMinerSystem() {
            const statusEl = document.getElementById('status');
            const detailsEl = document.getElementById('details');
            
            try {
                // Create a mock game engine
                const mockEngine = {
                    gameState: JSON.parse(JSON.stringify(DEFAULT_GAME_STATE)),
                    updateDisplay: () => {},
                    save: () => {}
                };
                
                // Initialize character system
                const characterSystem = new CharacterSystem(mockEngine);
                
                // Test 1: Check initial state
                const initialSlots = mockEngine.gameState.miners.slots.filter(slot => slot.unlocked).length;
                detailsEl.innerHTML += `<p>✓ Initial unlocked slots: ${initialSlots}</p>`;
                
                // Test 2: Try to unlock a slot
                const unlockCost = characterSystem.getSlotUnlockCost(2);
                detailsEl.innerHTML += `<p>✓ Slot 2 unlock cost: ${unlockCost} gold</p>`;
                
                // Give enough gold and unlock slot
                mockEngine.gameState.resources.gold = 1000;
                if (characterSystem.canUnlockSlot(2)) {
                    characterSystem.unlockSlot(2);
                    detailsEl.innerHTML += `<p>✓ Successfully unlocked slot 2</p>`;
                } else {
                    detailsEl.innerHTML += `<p>✗ Failed to unlock slot 2</p>`;
                }
                
                // Test 3: Buy a hirer
                const recruiterCost = characterSystem.getHirerCost('recruiter');
                detailsEl.innerHTML += `<p>✓ Recruiter cost: ${recruiterCost} gold</p>`;
                
                if (characterSystem.canBuyHirer('recruiter')) {
                    characterSystem.buyHirer('recruiter');
                    detailsEl.innerHTML += `<p>✓ Successfully bought recruiter</p>`;
                } else {
                    detailsEl.innerHTML += `<p>✗ Failed to buy recruiter</p>`;
                }
                
                // Test 4: Start hiring
                if (characterSystem.canStartHiring('recruiter')) {
                    characterSystem.startHiring('recruiter');
                    detailsEl.innerHTML += `<p>✓ Successfully started hiring process</p>`;
                } else {
                    detailsEl.innerHTML += `<p>✗ Failed to start hiring</p>`;
                }
                
                // Test 5: Test production calculation
                const slot = mockEngine.gameState.miners.slots[0];
                slot.miner = {
                    type: 'novice',
                    rarity: 'common',
                    durability: { pickaxe: 100, helmet: 100, boots: 100 }
                };
                slot.equipment = { pickaxe: 'wooden', helmet: null, boots: null };
                
                const production = characterSystem.calculateMinerProduction(slot, 'stone');
                detailsEl.innerHTML += `<p>✓ Novice miner with wooden pickaxe production: ${production} stone/s</p>`;
                
                statusEl.textContent = 'All tests passed! ✓';
                statusEl.style.color = 'green';
                
            } catch (error) {
                statusEl.textContent = 'Test failed! ✗';
                statusEl.style.color = 'red';
                detailsEl.innerHTML += `<p>Error: ${error.message}</p>`;
                console.error(error);
            }
        }
        
        // Run tests when page loads
        window.addEventListener('load', testMinerSystem);
    </script>
</body>
</html>
