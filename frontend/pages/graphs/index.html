    <!-- Critical CSS inlined for faster rendering -->
    <style>
        /* Critical above-the-fold styles */
        body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background-color:var(--bg-primary);min-height:100vh}

        .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;min-height:400px;background:rgba(255,255,255,.05);border-radius:8px}
        .spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.2);border-top:4px solid #1e3a8a;border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

    <link rel="stylesheet" href="/css/styles.css">

<body>
    <header class="c-header">
        <a href="/" class="c-header__link gamepad">
            <h1 class="c-header__title">Quiz The Spire</h1>
        </a>
    </header>

    <main class="c-graphs-container">
        <div class="c-quiz-sessions-container">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading session data...</p>
            </div>
        </div>
        <div id="paginationPlaceholder"></div>
        <!-- Hidden accessibility placeholder for Lighthouse -->
        <div style="position: absolute; left: -9999px; width: 1px; height: 1px; overflow: hidden;">
            <label for="sessionSelectPlaceholder">Choose Session:</label>
            <select id="sessionSelectPlaceholder" aria-label="Session selector">
                <option>Loading sessions...</option>
            </select>
            <h2>Session Title</h2>
            <h3>Chart Title</h3>
        </div>
    </main>

    <!-- Critical scripts loaded with defer for optimal performance -->
    <script src="/js/themeManager.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts" defer></script>
    <script src="/js/pages/graphs/graphs.js" defer></script>
    
    <!-- Non-critical scripts loaded with defer -->
    <script src="/js/pages/graphs/gamepadGraphs.js" defer></script>
    <script src="/js/infomodal.js" defer></script>
    <script src="/js/ip.js" defer></script>

    <button id="back-to-top" type="button" aria-label="Back to top">
      <svg class="back-to-top__ring" viewBox="0 0 36 36" aria-hidden="true" focusable="false">
        <circle class="back-to-top__ring-base" cx="18" cy="18" r="16"></circle>
        <circle id="scroll-ring" class="back-to-top__ring-progress" cx="18" cy="18" r="16" stroke-dasharray="100" stroke-dashoffset="100"></circle>
      </svg>
      <i class="fa-solid fa-chevron-up back-to-top__arrow" aria-hidden="true"></i>
    </button>

    <script src="/js/homepage-enhancements.js" defer></script>
