<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="twGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ce93d8"/>
      <stop offset="100%" style="stop-color:#6a1b9a"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="26" fill="url(#twGrad)" stroke="#4a148c" stroke-width="2"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="#e1bee7" stroke-width="1.5" opacity="0.4"/>
  <!-- Clock face -->
  <circle cx="32" cy="30" r="14" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Hour hand -->
  <line x1="32" y1="30" x2="32" y2="20" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="32" y1="30" x2="40" y2="28" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="30" r="2" fill="#ffeb3b"/>
  <!-- Spiral effect -->
  <path d="M32 50 Q38 46 36 42" fill="none" stroke="#e1bee7" stroke-width="1.5" opacity="0.6"/>
  <text x="32" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e1bee7">+10s</text>
</svg>
