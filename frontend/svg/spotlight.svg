<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="slGrad" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#fff9c4"/>
      <stop offset="40%" style="stop-color:#ffeb3b"/>
      <stop offset="100%" style="stop-color:#f9a825"/>
    </radialGradient>
    <filter id="slGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Light cone -->
  <polygon points="32,8 14,56 50,56" fill="url(#slGrad)" opacity="0.3" filter="url(#slGlow)"/>
  <!-- Spotlight body -->
  <ellipse cx="32" cy="10" rx="10" ry="6" fill="#616161" stroke="#424242" stroke-width="1.5"/>
  <rect x="28" y="4" width="8" height="4" rx="2" fill="#757575"/>
  <!-- Light bulb -->
  <circle cx="32" cy="12" r="4" fill="#fff9c4" filter="url(#slGlow)"/>
  <!-- Light rays -->
  <line x1="32" y1="20" x2="20" y2="52" stroke="#fff176" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="20" x2="44" y2="52" stroke="#fff176" stroke-width="1" opacity="0.4"/>
  <line x1="32" y1="20" x2="32" y2="54" stroke="#fff176" stroke-width="1" opacity="0.3"/>
  <!-- Sparkles -->
  <circle cx="24" cy="36" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="40" cy="42" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="32" cy="32" r="2" fill="#fff" opacity="0.6"/>
</svg>
