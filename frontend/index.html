    <script>
    (function(){'use strict';function getCurrentTheme(){const t=document.documentElement.getAttribute('data-theme');if(t)return t;if(document.body.classList.contains('theme-dark'))return'dark';if(document.body.classList.contains('theme-light'))return'light';return localStorage.getItem('theme')||localStorage.getItem('quiz-theme-preference')||'light'}function updateModals(){const theme=getCurrentTheme(),isDark=theme==='dark',infoModal=document.getElementById('infoModal'),infoBtn=document.getElementById('infoBtn');if(infoModal){const content=infoModal.querySelector('.modal-content'),closeBtn=infoModal.querySelector('.close-btn');if(isDark){infoModal.classList.add('qts-dark');if(content){content.style.background='#0f1724';content.style.color='#e6eef9';content.style.boxShadow='0 10px 30px rgba(0,0,0,0.6)';content.querySelectorAll('.info-list li').forEach(li=>{li.style.color='#cbd5e1';const strong=li.querySelector('strong');if(strong)strong.style.color='#93c5fd'});content.querySelectorAll('.section-title').forEach(t=>{t.style.color='#93c5fd';t.style.borderBottomColor='rgba(255,255,255,0.08)'});const modalTitle=content.querySelector('.modal-title');if(modalTitle)modalTitle.style.color='#e6eef9';content.querySelectorAll('.info-section p').forEach(p=>p.style.color='#cbd5e1')}if(closeBtn){closeBtn.style.background='#0b1220';closeBtn.style.border='1px solid rgba(255,255,255,0.1)';closeBtn.style.color='#cbd5e1'}if(infoBtn){infoBtn.style.background='#1d4ed8';infoBtn.style.boxShadow='0 2px 10px rgba(29,78,216,0.3)'}}else{infoModal.classList.remove('qts-dark');if(content){content.style.background='white';content.style.color='#2c3e50';content.style.boxShadow='0 10px 30px rgba(0,0,0,0.3)';content.querySelectorAll('.info-list li').forEach(li=>{li.style.color='#555';const strong=li.querySelector('strong');if(strong)strong.style.color='#2c3e50'});content.querySelectorAll('.section-title').forEach(t=>{t.style.color='#34495e';t.style.borderBottomColor='#e9ecef'});const modalTitle=content.querySelector('.modal-title');if(modalTitle)modalTitle.style.color='#2c3e50';content.querySelectorAll('.info-section p').forEach(p=>p.style.color='#555')}if(closeBtn){closeBtn.style.background='#f8f9fa';closeBtn.style.border='1px solid #dee2e6';closeBtn.style.color='#6c757d'}if(infoBtn){infoBtn.style.background='#007bff';infoBtn.style.boxShadow='0 2px 10px rgba(0,123,255,0.3)'}}}const privacyModal=document.getElementById('privacy-modal-container');if(privacyModal){const header=privacyModal.querySelector('div[style*="padding: 20px"]'),footer=privacyModal.querySelectorAll('div[style*="padding: 20px"]')[1],title=privacyModal.querySelector('h2'),acceptBtn=privacyModal.querySelector('button');if(isDark){privacyModal.style.backgroundColor='#0b1220';privacyModal.style.boxShadow='0 10px 40px rgba(0,0,0,0.6)';privacyModal.style.border='1px solid rgba(255,255,255,0.1)';if(header){header.style.background='#071029';header.style.borderBottom='1px solid rgba(255,255,255,0.06)'}if(title)title.style.color='#e6eef9';if(footer){footer.style.background='#071029';footer.style.borderTop='1px solid rgba(255,255,255,0.06)'}if(acceptBtn){acceptBtn.style.backgroundColor='#2563eb';acceptBtn.onmouseover=()=>acceptBtn.style.backgroundColor='#1e40af';acceptBtn.onmouseout=()=>acceptBtn.style.backgroundColor='#2563eb'}}else{privacyModal.style.backgroundColor='white';privacyModal.style.boxShadow='0 10px 40px rgba(0,0,0,0.3)';privacyModal.style.border='1px solid #e9ecef';if(header){header.style.background='#f8f9fa';header.style.borderBottom='1px solid #e9ecef'}if(title)title.style.color='#333';if(footer){footer.style.background='#f8f9fa';footer.style.borderTop='1px solid #e9ecef'}if(acceptBtn){acceptBtn.style.backgroundColor='#2e7d32';acceptBtn.onmouseover=()=>acceptBtn.style.backgroundColor='#1b5e20';acceptBtn.onmouseout=()=>acceptBtn.style.backgroundColor='#2e7d32'}}const iframe=document.getElementById('privacy-iframe');if(iframe&&iframe.contentWindow){try{iframe.contentWindow.postMessage({type:'applyTheme',theme},window.location.origin)}catch(e){}}}}window.addEventListener('storage',function(e){if((e.key==='theme'||e.key==='quiz-theme-preference')&&e.newValue){setTimeout(updateModals,50)}});window.addEventListener('themeChanged',function(e){setTimeout(updateModals,50)});const observer=new MutationObserver(function(mutations){let themeChanged=false;mutations.forEach(function(mutation){if(mutation.type==='attributes'&&(mutation.attributeName==='data-theme'||mutation.attributeName==='class')){themeChanged=true}if(mutation.type==='childList'){mutation.addedNodes.forEach(function(node){if(node.id==='infoModal'||node.id==='privacy-modal-overlay'){setTimeout(updateModals,10)}})}if(mutation.type==='attributes'&&mutation.attributeName==='style'){if(mutation.target.id==='infoModal'&&mutation.target.style.display==='block'){setTimeout(updateModals,10)}}});if(themeChanged){setTimeout(updateModals,10)}});observer.observe(document.documentElement,{attributes:true,attributeFilter:['data-theme','class']});observer.observe(document.body,{childList:true,subtree:false,attributes:true,attributeFilter:['style','class']});setTimeout(updateModals,100)})();
    </script>
