<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="author" content="Oroka Conner">
    <meta name="owner" content="Oroka Conner">
    <meta name="copyright" content="Copyright © 2025 Oroka Conner. All rights reserved.">
    <meta property="og:site_name" content="Quiz The Spire by Oroka Conner">
    
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preload" href="css/radar.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="css/radar.css"></noscript>
    <link rel="preload" href="css/sio.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="css/sio.css"></noscript>

</head>
<body class="theme-blue">
    <header class="c-header">
        <h1>Quiz The Spire</h1>
        <p style="font-size: 0.9em; opacity: 0.8; margin-top: 5px;">Created and owned by Oroka Conner</p>
    </header>
    <div id="connection-status" class="status-initial">Connecting...</div>
    <div id="error-message" class="error-message" style="display: none;"></div>
    <main class="o-container">
        <div class="c-welcome-message">
            <p>Welcome to Quiz The Spire! An interactive quiz game with dynamic difficulty based on your environment.
            </p>
        </div>

        
        <div class="o-button-group">
            <button id="viewGraphsBtn" class="c-btn c-btn--tertiary gamepad">View Graphs</button>
            <button id="startQuizBtn" class="c-btn c-btn--tertiary gamepad">Start or join Quiz</button>
            <button id="manageQuizBtn" class="c-btn c-btn--tertiary">Manage Quiz</button>
        </div>
        <div class="o-status-display">
            <div class="u-flex u-gap-1">
                <span>Temperature: <span id="tempValue">--</span>°C</span>
                <span>Light: <span id="lightValue">--</span> lux</span>
            </div>
        </div>
        <div class="c-servo-test">
            <div class="o-servo-buttons">
                <button id="servoTestBtn" class="c-btn c-btn--tertiary gamepad">Toggle Theme</button>
                <button id="studyQuizBtn" class="c-btn c-btn--tertiary" onclick="window.location.href='html/study.html'">Study quiz questions</button>
                <button id="articleTheSpireBtn" class="c-btn c-btn--tertiary" onclick="window.location.href='html/content.html'">Article the spire</button>
                <button id="conversionBtn" class="c-btn c-btn--tertiary" onclick="window.location.href='html/conversion.html'">File Converter</button>
                <button id="mediaConverterBtn" class="c-btn c-btn--primary" onclick="window.location.href='html/converter.html'">🎵 Convert The Spire</button>
                <button id="storyCreatorBtn" class="c-btn c-btn--tertiary" onclick="window.location.href='html/storyCreator.html'">Story Creator</button>
            </div>
            <div class="c-servo-visual" id="servoVisual"></div>
        </div>
        <!-- Separate row below the big section -->
        <div class="o-button-group u-mt-2" style="max-width: 320px; margin-left: auto; margin-right: auto;">
            <button id="articlesHubBtn" class="c-btn c-btn--tertiary c-btn--sm" onclick="window.location.href='articles/articlepagenew.html'">📰 New Articles</button>
        </div>
        <!-- Game section below main buttons -->
        <div class="o-button-group u-mb-2" style="max-width: 320px; margin-left: auto; margin-right: auto;">
            <button id="kingdomQuarryBtn" class="c-btn c-btn--primary c-btn--sm" onclick="window.location.href='idleGame/idlegame.html';")>⛏️ Industrial Empire</button>
        </div>

        <div class="o-button-group u-mb-2" style="max-width: 320px; margin-left: auto; margin-right: auto;">
            <button id="kingdomQuarryBtn" class="c-btn c-btn--primary c-btn--sm" onclick="window.location.href='html/support.html';")> Contact Support</button>
        </div>
    
    </main>

    <footer style="text-align: center; padding: 20px; margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1);">
        <p style="margin: 5px 0; font-size: 0.95em;">
            <strong>© 2025 Quiz The Spire</strong><br>
            Created, Owned & Operated by <strong>Oroka Conner</strong><br>
            All rights reserved.
        </p>
    </footer>

    <script src="js/themeManager.js"></script>
    <script src="js/main.js" defer></script>
    <script src="js/lofi.js"></script>
    <script src="js/gamepad.js"></script>
    <script src="js/ip.js"></script>
    <script src="js/radar.js" defer></script>
    <script src="js/infomodal.js"></script>
</body>
</html>
