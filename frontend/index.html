    <script src="js/themeManager.js"></script>

    <script>
    // Modal theme update fix - works with existing themeManager.js
    (function() {
        'use strict';
        
        // Get current theme from the ACTUAL applied theme on document
        function getCurrentTheme() {
            // Check what themeManager.js has set
            const dataTheme = document.documentElement.getAttribute('data-theme');
            if (dataTheme) return dataTheme;
            
            // Fallback to body class
            if (document.body.classList.contains('theme-dark')) return 'dark';
            if (document.body.classList.contains('theme-light')) return 'light';
            
            // Final fallback to localStorage
            return localStorage.getItem('theme') || localStorage.getItem('quiz-theme-preference') || 'light';
        }
        
        // Update ONLY modals to match current theme
        function updateModals() {
            const theme = getCurrentTheme();
            const isDark = theme === 'dark';
            
            // Update info modal if it exists
            const infoModal = document.getElementById('infoModal');
            const infoBtn = document.getElementById('infoBtn');
            if (infoModal) {
                const content = infoModal.querySelector('.modal-content');
                const closeBtn = infoModal.querySelector('.close-btn');
                
                if (isDark) {
                    infoModal.classList.add('qts-dark');
                    if (content) {
                        content.style.background = '#0f1724';
                        content.style.color = '#e6eef9';
                        content.style.boxShadow = '0 10px 30px rgba(0,0,0,0.6)';
                        // Fix contrast for list items
                        const listItems = content.querySelectorAll('.info-list li');
                        listItems.forEach(li => {
                            li.style.color = '#cbd5e1';
                            const strong = li.querySelector('strong');
                            if (strong) strong.style.color = '#93c5fd';
                        });
                        const sectionTitles = content.querySelectorAll('.section-title');
                        sectionTitles.forEach(t => {
                            t.style.color = '#93c5fd';
                            t.style.borderBottomColor = 'rgba(255,255,255,0.08)';
                        });
                        const modalTitle = content.querySelector('.modal-title');
                        if (modalTitle) modalTitle.style.color = '#e6eef9';
                        const paragraphs = content.querySelectorAll('.info-section p');
                        paragraphs.forEach(p => p.style.color = '#cbd5e1');
                    }
                    if (closeBtn) {
                        closeBtn.style.background = '#0b1220';
                        closeBtn.style.border = '1px solid rgba(255,255,255,0.1)';
                        closeBtn.style.color = '#cbd5e1';
                    }
                    if (infoBtn) {
                        infoBtn.style.background = '#1d4ed8';
                        infoBtn.style.boxShadow = '0 2px 10px rgba(29,78,216,0.3)';
                    }
                } else {
                    infoModal.classList.remove('qts-dark');
                    if (content) {
                        content.style.background = 'white';
                        content.style.color = '#2c3e50';
                        content.style.boxShadow = '0 10px 30px rgba(0,0,0,0.3)';
                        const listItems = content.querySelectorAll('.info-list li');
                        listItems.forEach(li => {
                            li.style.color = '#555';
                            const strong = li.querySelector('strong');
                            if (strong) strong.style.color = '#2c3e50';
                        });
                        const sectionTitles = content.querySelectorAll('.section-title');
                        sectionTitles.forEach(t => {
                            t.style.color = '#34495e';
                            t.style.borderBottomColor = '#e9ecef';
                        });
                        const modalTitle = content.querySelector('.modal-title');
                        if (modalTitle) modalTitle.style.color = '#2c3e50';
                        const paragraphs = content.querySelectorAll('.info-section p');
                        paragraphs.forEach(p => p.style.color = '#555');
                    }
                    if (closeBtn) {
                        closeBtn.style.background = '#f8f9fa';
                        closeBtn.style.border = '1px solid #dee2e6';
                        closeBtn.style.color = '#6c757d';
                    }
                    if (infoBtn) {
                        infoBtn.style.background = '#007bff';
                        infoBtn.style.boxShadow = '0 2px 10px rgba(0,123,255,0.3)';
                    }
                }
            }
            
            // Update privacy modal if it exists
            const privacyModal = document.getElementById('privacy-modal-container');
            if (privacyModal) {
                const header = privacyModal.querySelector('div[style*="padding: 20px"]');
                const footer = privacyModal.querySelectorAll('div[style*="padding: 20px"]')[1];
                const title = privacyModal.querySelector('h2');
                const acceptBtn = privacyModal.querySelector('button');
                
                if (isDark) {
                    privacyModal.style.backgroundColor = '#0b1220';
                    privacyModal.style.boxShadow = '0 10px 40px rgba(0,0,0,0.6)';
                    privacyModal.style.border = '1px solid rgba(255,255,255,0.1)';
                    if (header) {
                        header.style.background = '#071029';
                        header.style.borderBottom = '1px solid rgba(255,255,255,0.06)';
                    }
                    if (title) title.style.color = '#e6eef9';
                    if (footer) {
                        footer.style.background = '#071029';
                        footer.style.borderTop = '1px solid rgba(255,255,255,0.06)';
                    }
                    if (acceptBtn) {
                        acceptBtn.style.backgroundColor = '#2563eb';
                        acceptBtn.onmouseover = () => acceptBtn.style.backgroundColor = '#1e40af';
                        acceptBtn.onmouseout = () => acceptBtn.style.backgroundColor = '#2563eb';
                    }
                } else {
                    privacyModal.style.backgroundColor = 'white';
                    privacyModal.style.boxShadow = '0 10px 40px rgba(0,0,0,0.3)';
                    privacyModal.style.border = '1px solid #e9ecef';
                    if (header) {
                        header.style.background = '#f8f9fa';
                        header.style.borderBottom = '1px solid #e9ecef';
                    }
                    if (title) title.style.color = '#333';
                    if (footer) {
                        footer.style.background = '#f8f9fa';
                        footer.style.borderTop = '1px solid #e9ecef';
                    }
                    if (acceptBtn) {
                        acceptBtn.style.backgroundColor = '#2e7d32';
                        acceptBtn.onmouseover = () => acceptBtn.style.backgroundColor = '#1b5e20';
                        acceptBtn.onmouseout = () => acceptBtn.style.backgroundColor = '#2e7d32';
                    }
                }
                
                // Post theme to iframe
                const iframe = document.getElementById('privacy-iframe');
                if (iframe && iframe.contentWindow) {
                    try {
                        iframe.contentWindow.postMessage({ type: 'applyTheme', theme }, window.location.origin);
                    } catch (e) {}
                }
            }
        }
        
        // Listen for storage events from other tabs/converter pages
        window.addEventListener('storage', function(e) {
            if ((e.key === 'theme' || e.key === 'quiz-theme-preference') && e.newValue) {
                setTimeout(updateModals, 50);
            }
        });
        
        // Listen for custom theme change event
        window.addEventListener('themeChanged', function(e) {
            setTimeout(updateModals, 50);
        });
        
        // Watch for theme attribute changes on html/body
        const observer = new MutationObserver(function(mutations) {
            let themeChanged = false;
            mutations.forEach(function(mutation) {
                if (mutation.type === 'attributes' && 
                    (mutation.attributeName === 'data-theme' || mutation.attributeName === 'class')) {
                    themeChanged = true;
                }
                if (mutation.type === 'childList') {
                    mutation.addedNodes.forEach(function(node) {
                        if (node.id === 'infoModal' || node.id === 'privacy-modal-overlay') {
                            setTimeout(updateModals, 10);
                        }
                    });
                }
                if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                    if (mutation.target.id === 'infoModal' && mutation.target.style.display === 'block') {
                        setTimeout(updateModals, 10);
                    }
                }
            });
            if (themeChanged) {
                setTimeout(updateModals, 10);
            }
        });
        
        observer.observe(document.documentElement, { 
            attributes: true,
            attributeFilter: ['data-theme', 'class']
        });
        
        observer.observe(document.body, { 
            childList: true, 
            subtree: false,
            attributes: true,
            attributeFilter: ['style', 'class']
        });
        
        // Initial update
        setTimeout(updateModals, 100);
        
    })();
    </script>
</body>
