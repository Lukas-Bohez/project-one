<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quiz Session | Quiz The Spire</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/quiz.css">
    <link rel="stylesheet" href="../css/chat.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body>
    <header class="c-header">
        <a href="../index.html" class="c-header__link">
            <h1 class="c-header__title gamepad">Quiz The Spire</h1>
        </a>
        <button id="infoBtn" class="c-info-btn">i</button>
    </header>
    <main class="c-quiz-container">
        <div class="c-quiz-header">
            <div class="c-items-container">
                <div class="c-item-slot gamepad-special gamepad" id="item1">
                    <!-- Hover controls removed -->
                </div>
                <div class="c-item-slot gamepad-special gamepad" id="item2">
                    <!-- Hover controls removed -->
                </div>
                <div class="c-item-slot gamepad-special gamepad" id="item3">
                    <!-- Hover controls removed -->
                </div>
            </div>
            <div class="c-quiz-controls">
                <div class="c-stats-display">
                </div>
                <button id="servoTestBtn" class="c-btn c-btn--tertiary gamepad">Toggle Theme</button>
            </div>
            <div class="c-timer-container">
                <div class="c-servo-visual" id="servoVisual">
                    <div class="c-servo-bar"></div>
                </div>
                <span class="c-time-remaining" id="timeRemaining">60</span>
            </div>
        </div>
        </div>
        <div class="c-question-container">
            <h2 id="questionText">Loading question...</h2>
            <div class="c-image-container" id="questionImage"></div>
        </div>
        <div class="c-answers-container">
            <button class="c-answer-btn gamepad" id="answer1"></button>
            <button class="c-answer-btn gamepad" id="answer2"></button>
            <button class="c-answer-btn gamepad" id="answer3"></button>
            <button class="c-answer-btn gamepad" id="answer4"></button>
        </div>
        <!-- Place Players and Chat below answers -->
        <div class="c-players-container">
            <h3>Players</h3>
            <div class="c-players-list" id="playersList">
                <!-- Player items will be added here dynamically -->
            </div>
        </div>
        <div class="c-chat-container">
            <div class="c-chat-header">
                <h3>Quiz Chat</h3>
                <button id="chatToggle" class="c-chat-toggle">−</button>
            </div>
            <div class="c-chat-content" id="chatContent">
                <div class="c-chat-messages" id="chatMessages">
                    <!-- Chat messages will be added here dynamically -->
                </div>
                <div class="c-chat-input-container">
                    <input type="text" id="chatInput" class="c-chat-input" placeholder="Type a message..."
                        maxlength="1000">
                    <button id="chatSend" class="c-chat-send-btn">Send</button>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/themeManager.js"></script>
    <script src="../js/items.js"></script>
    <script src="../js/infomodal.js"></script>
    <script src="../js/gamepadQuiz.js"></script>
    <script src="../js/quiz.js"></script>
    <script src="../js/quizmain.js"></script>
    <div class="c-scroll-extension"></div>
    <script src="../js/lofi.js"></script>
    <script src="../js/quizlogic2.js"></script>
    <script src="../js/quizlogic.js"></script>
    <script src="../js/quizlogic3.js"></script>
    <script src="../js/quizlogic4.js"></script>
    <script src="../js/ip.js"></script>
    <script src="../js/quizPlayerListManager.js"></script>
    <script src="../js/quizlogin.js"></script>
    <script src="../js/chat.js"></script>
    <script src="../js/quizItems.js"></script>
    <script src="../js/privacy.js"></script>
    <script src="../js/content.js"></script>
</body>

</html>
