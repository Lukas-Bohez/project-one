<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8418485814964449" crossorigin="anonymous"></script>
    <title>Graphs | Quiz The Spire</title>
    <meta name="description" content="View detailed performance graphs and statistics for Quiz The Spire sessions. Track temperature, light levels, and quiz performance metrics over time.">
    
    <!-- Preconnect to external domains to improve loading performance -->
    <link rel="preconnect" href="https://cdn.socket.io" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.socket.io">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    
    <!-- Preload critical resources -->
    <link rel="preload" href="../css/styles.css" as="style">
    <link rel="preload" href="../css/graphs.css" as="style">
    <link rel="preload" href="../js/themeManager.js" as="script">
    <link rel="preload" href="../js/graphs.js" as="script">
    
    <!-- Critical CSS inlined for faster rendering -->
    <style>
        /* Critical above-the-fold styles */
        body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background-color:var(--bg-primary);min-height:100vh}
        .c-header{background:linear-gradient(135deg,#1e3a8a,#0c4061);color:#fff;padding:1.5rem 1rem;text-align:center;border-bottom:1px solid rgba(255,255,255,.1)}
        .c-header__title{margin:0;font-size:1.25rem;font-weight:600;color:#fff !important}
        .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;min-height:400px;background:rgba(255,255,255,.05);border-radius:8px}
        .spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.2);border-top:4px solid #1e3a8a;border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
    
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/graphs.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" defer></script>
</head>

<body>
    <header class="c-header">
        <a href="../index.html" class="c-header__link gamepad">
            <h1 class="c-header__title">Quiz The Spire</h1>
        </a>
    </header>

    <main class="c-graphs-container">
        <div class="c-quiz-sessions-container">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading session data...</p>
            </div>
        </div>
        <div id="paginationPlaceholder"></div>
        <!-- Hidden accessibility placeholder for Lighthouse -->
        <div style="position: absolute; left: -9999px; width: 1px; height: 1px; overflow: hidden;">
            <label for="sessionSelectPlaceholder">Choose Session:</label>
            <select id="sessionSelectPlaceholder" aria-label="Session selector">
                <option>Loading sessions...</option>
            </select>
            <h2>Session Title</h2>
            <h3>Chart Title</h3>
        </div>
    </main>

    <!-- Critical scripts loaded with defer for optimal performance -->
    <script src="../js/themeManager.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts" defer></script>
    <script src="../js/graphs.js" defer></script>
    
    <!-- Non-critical scripts loaded with defer -->
    <script src="../js/gamepadGraphs.js" defer></script>
    <script src="../js/lofi.js" defer></script>
    <script src="../js/infomodal.js" defer></script>
    <script src="../js/ip.js" defer></script>
    <script src="../js/privacy.js" defer></script>
</body>

</html>
