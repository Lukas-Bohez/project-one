<!DOCTYPE html>
<html>
<head>
  <title>Convert the Spire</title>
  <style>
    body {
      width: 400px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .header {
      text-align: center;
      margin-bottom: 10px;
    }
    .header h3 {
      margin: 0;
      color: #2c4c7c;
      font-size: 18px;
    }
    .url-display {
      font-size: 12px;
      color: #666;
      word-break: break-all;
      background: white;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ddd;
    }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: white;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    .control-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .control-row label {
      min-width: 60px;
      font-size: 12px;
      font-weight: 500;
    }
    select, input {
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 3px;
      flex: 1;
    }
    button {
      padding: 8px 16px;
      background: #2c4c7c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
    }
    button:hover:not(:disabled) {
      background: #1f3a5f;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .select-btn {
      background: #666;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      padding: 8px 12px;
      margin-right: 8px;
    }
    .select-btn:hover {
      background: #555;
    }
    .status {
      font-size: 12px;
      padding: 8px;
      border-radius: 4px;
      min-height: 20px;
    }
    .status.info { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }
    .status.success { background: #e8f5e8; color: #2e7d32; border: 1px solid #c8e6c9; }
    .status.error { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
    .status.warning { background: #fff3e0; color: #ef6c00; border: 1px solid #ffcc02; }

    .progress-container {
      display: none;
      background: white;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #eee;
      border-radius: 4px;
      overflow: hidden;
      margin: 8px 0;
    }
    .progress-fill {
      height: 100%;
      background: #2c4c7c;
      width: 0%;
      transition: width 0.3s ease;
    }
    .queue-list {
      max-height: 300px;
      overflow-y: auto;
      font-size: 11px;
    }
    .queue-item {
      padding: 8px;
      margin: 4px 0;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .queue-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .queue-item.selected {
      background: rgba(44, 76, 124, 0.2);
      border: 2px solid #2c4c7c;
    }
    .queue-item.pending { border-left: 3px solid #fff3e0; }
    .queue-item.processing { border-left: 3px solid #e3f2fd; }
    .queue-item.completed { border-left: 3px solid #e8f5e8; }
    .queue-item.failed { border-left: 3px solid #ffebee; }

    .video-thumbnail {
      position: relative;
      flex-shrink: 0;
    }
    .video-thumbnail img {
      width: 80px;
      height: 60px;
      object-fit: cover;
      border-radius: 4px;
    }
    .duration {
      position: absolute;
      bottom: 2px;
      right: 2px;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 1px 3px;
      border-radius: 2px;
      font-size: 9px;
    }
    .video-info {
      flex: 1;
      min-width: 0;
    }
    .video-title {
      font-weight: 500;
      font-size: 12px;
      line-height: 1.3;
      margin-bottom: 2px;
      word-break: break-word;
    }
    .video-author {
      font-size: 10px;
      color: #888;
      margin-bottom: 2px;
    }
    .video-status {
      font-size: 9px;
      text-transform: uppercase;
      font-weight: 500;
    }
    .no-videos {
      text-align: center;
      padding: 20px;
      color: #666;
      font-style: italic;
    }

    .settings {
      background: white;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #ddd;
      margin-top: 8px;
    }
    .settings-toggle {
      width: 100%;
      background: #666;
      margin-bottom: 8px;
    }
    .settings-content {
      display: none;
    }
    .settings-content.show {
      display: block;
    }

    .logs-section {
      margin-top: 8px;
    }
    .logs-toggle {
      width: 100%;
      background: #4a5568;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .logs-toggle:hover {
      background: #374151;
    }
    .logs-content {
      display: none;
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-top: 4px;
      max-height: 200px;
    }
    .logs-content.show {
      display: block;
    }
    .logs-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      border-bottom: 1px solid #eee;
      background: #f8f9fa;
    }
    .logs-header button {
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 3px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 11px;
    }
    .logs-header button:hover {
      background: #c82333;
    }
    #log-count {
      font-size: 11px;
      color: #666;
    }
    .logs-entries {
      max-height: 150px;
      overflow-y: auto;
      padding: 8px;
      font-family: monospace;
      font-size: 11px;
      line-height: 1.4;
    }
    .log-entry {
      margin: 2px 0;
      padding: 2px 4px;
      border-radius: 2px;
      word-break: break-all;
    }
    .log-entry.info { background: #e3f2fd; color: #1565c0; }
    .log-entry.success { background: #e8f5e8; color: #2e7d32; }
    .log-entry.warning { background: #fff3e0; color: #ef6c00; }
    .log-entry.error { background: #ffebee; color: #c62828; }
    .log-entry.debug { background: #f3e5f5; color: #6a1b9a; }
    .log-timestamp {
      color: #999;
      font-size: 10px;
      margin-right: 4px;
    }

    /* Tab Navigation */
    .tab-navigation {
      display: flex;
      background: white;
      border-radius: 6px 6px 0 0;
      border: 1px solid #ddd;
      border-bottom: none;
      overflow: hidden;
    }
    .tab-button {
      flex: 1;
      padding: 10px 8px;
      background: #f8f9fa;
      border: none;
      border-right: 1px solid #ddd;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: #666;
      transition: all 0.2s;
    }
    .tab-button:last-child {
      border-right: none;
    }
    .tab-button.active {
      background: white;
      color: #2c4c7c;
      border-bottom: 2px solid #2c4c7c;
    }
    .tab-button:hover:not(.active) {
      background: #e9ecef;
    }

    /* Tab Content */
    .tab-content {
      display: none;
      background: white;
      border: 1px solid #ddd;
      border-top: none;
      border-radius: 0 0 6px 6px;
      padding: 12px;
    }
    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h3>Convert the Spire</h3>
    </div>

    <div id="status" class="status"></div>

    <!-- Tab Navigation -->
    <div class="tab-navigation">
      <button class="tab-button active" data-tab="main">Main</button>
      <button class="tab-button" data-tab="logs">Debug Logs</button>
      <button class="tab-button" data-tab="settings">Settings</button>
    </div>

    <!-- Main Tab -->
    <div id="main-tab" class="tab-content active">
      <div class="url-display" id="url-display"></div>

      <div class="controls">
        <div class="control-row">
          <label for="format">Format:</label>
          <select id="format">
            <option value="mp4">MP4 (Video)</option>
            <option value="mp3">MP3 (Audio)</option>
          </select>
        </div>

        <div class="control-row">
          <label for="quality">Quality:</label>
          <select id="quality">
            <option value="best">Best Quality</option>
            <option value="1080p">1080p</option>
            <option value="720p">720p</option>
            <option value="480p">480p</option>
            <option value="360p">360p</option>
            <option value="worst">Worst Quality</option>
          </select>
        </div>

        <div class="control-row">
          <label for="download-dir">Save to:</label>
          <input type="text" id="download-dir" placeholder="Downloads/ConvertTheSpire" value="Downloads/ConvertTheSpire">
        </div>

        <div class="control-row">
          <button id="select-all-btn" class="select-btn">Select All</button>
          <button id="convert-btn" class="convert-btn">Convert Selected</button>
        </div>
      </div>

      <div class="progress-container" id="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div id="progress-text">Initializing...</div>
        <div class="queue-list" id="queue-list"></div>
      </div>
    </div>

    <!-- Logs Tab -->
    <div id="logs-tab" class="tab-content">
      <div class="logs-header">
        <button id="clear-logs">Clear Logs</button>
        <button id="export-logs">Export Logs</button>
        <span id="log-count">0 entries</span>
      </div>
      <div class="logs-entries" id="logs-entries"></div>
    </div>

    <!-- Settings Tab -->
    <div id="settings-tab" class="tab-content">
      <div class="settings-content">
        <div class="control-row">
          <label for="max-retries">Max Retries:</label>
          <input type="number" id="max-retries" value="3" min="1" max="10">
        </div>
        <div class="control-row">
          <label for="retry-delay">Retry Delay (s):</label>
          <input type="number" id="retry-delay" value="5" min="1" max="60">
        </div>
        <button id="save-settings">Save Settings</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
