<!DOCTYPE html>
<html>
<head>
  <title>YouTube Converter</title>
  <style>
    body { width: 300px; padding: 10px; font-family: Arial, sans-serif; }
    .container { display: flex; flex-direction: column; gap: 10px; }
    .url-display { font-size: 12px; color: #666; word-break: break-all; }
    .controls { display: flex; flex-direction: column; gap: 8px; }
    select, button { padding: 8px; }
    button { background: #ff0000; color: white; border: none; cursor: pointer; }
    button:hover { background: #cc0000; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .status { font-size: 12px; color: #666; }
    .error { color: red; }
    .success { color: green; }
  </style>
</head>
<body>
  <div class="container">
    <h3>YouTube Converter</h3>
    <div id="url-display" class="url-display"></div>
    
    <div class="controls">
      <select id="format">
        <option value="mp4">MP4 (Video)</option>
        <option value="mp3">MP3 (Audio)</option>
      </select>
      
      <select id="quality">
        <option value="best">Best Quality</option>
        <option value="1080p">1080p</option>
        <option value="720p">720p</option>
        <option value="480p">480p</option>
        <option value="360p">360p</option>
        <option value="worst">Worst Quality</option>
      </select>
      
      <button id="convert-btn">Convert & Download</button>
    </div>
    
    <div id="status" class="status"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
