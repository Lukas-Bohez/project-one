<!DOCTYPE html>
<html>

<head>
<title>Convert the Spire</title>

    <link rel='stylesheet' type='text/css' media='screen' href='/popup/bootstrap.min.css'>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #0c4061 100%);
            color: #fff;
        }
        .spire-header {
            background: linear-gradient(135deg, #1e3a8a, #0c4061);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .spire-header h3 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
        .list-group {
            background: #fff;
            color: #111;
        }
        .list-group-item {
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }
        .list-group-item:hover {
            border-left-color: #2c6fb8;
            background: #f0f3f6;
            transform: translateX(2px);
        }
        .VideoTitle {
            color: #4b5561;
            font-weight: 500;
            display: block;
            padding: 10px 15px;
            background: #f7f8fa;
            border-bottom: 1px solid #e1e4e8;
        }
        .Loading {
            padding: 30px 15px;
            text-align: center;
            background: #fff;
            color: #2c6fb8;
        }
        .spinner-grow {
            color: #2c6fb8;
        }
        .notYoutube {
            padding: 20px 15px;
            background: #fff;
            color: #4b5561;
            text-align: center;
        }
        .LinkContainer {
            background: #fff;
        }
    </style>

    <script src='/popup/jquery.js'></script>
    <script src='/popup/popup.js'></script>
  </head>

  <body>

    <div style="width: 400px;">
      <div class="spire-header">
        <h3>⚡ Convert the Spire</h3>
      </div>
      <div class="list-group">
            
            <div class="Loading" style="display: none;">
                <div class="spinner-grow" role="status">
                    <span class="sr-only"></span>
                </div>
                <div style="margin-top: 10px; font-weight: 500;">Generating download links...</div>
            </div>

            <div class="notYoutube" style="display: none;">
                <strong>Not a YouTube page</strong><br>
                <small style="color: #9aa6b2;">Open this extension on a YouTube video page</small>
            </div>

            <small class="VideoTitle"></small>
            <div class="LinkContainer">

            </div>
        </div>
    </div>

</body>

</html>
