<IfModule mod_ssl.c>
<VirtualHost *:443>
    Protocols h2 http/1.1
    ServerName quizthespire.com
    ServerAlias www.quizthespire.com localhost
    DocumentRoot "/home/student/Project/project-one/frontend"

    <Directory "/home/student/Project/project-one/frontend">
        Options -Indexes +FollowSymLinks
        DirectoryIndex index.html
        AllowOverride All
        Require all granted
    </Directory>

    SSLEngine on
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1 +TLSv1.2 +TLSv1.3
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder off
    SSLSessionTickets off

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} =upgrade [NC]
    RewriteRule ^/socket.io/(.*) ws://127.0.0.1:8001/socket.io/$1 [P,L]

    ProxyPass /api http://127.0.0.1:8001/api
    ProxyPassReverse /api http://127.0.0.1:8001/api

    ProxyPass /socket.io http://127.0.0.1:8001/socket.io
    ProxyPassReverse /socket.io http://127.0.0.1:8001/socket.io

    # Serve portfolio as static export output (no Next server needed for runtime)
    Alias /portfolio/ "/home/student/Project/project-one/frontend/portfolio/out/"
    <Directory "/home/student/Project/project-one/frontend/portfolio/out/">
        Options -Indexes +FollowSymLinks
        DirectoryIndex index.html
        AllowOverride All
        Require all granted
    </Directory>

    # Also redirect /portfolio base path to /portfolio/ to prevent directory index issues
    RedirectMatch 301 ^/portfolio$ /portfolio/

    ProxyRequests Off

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    # Remove backend CORS headers to prevent conflicts
    Header unset Access-Control-Allow-Origin
    Header unset Access-Control-Allow-Methods
    Header unset Access-Control-Allow-Headers
    Header unset Access-Control-Allow-Credentials
    Header unset Access-Control-Max-Age

    # Set consistent CORS headers from Apache
    Header always set Access-Control-Allow-Origin "https://quizthespire.com"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Requested-With"
    Header always set Access-Control-Allow-Credentials "true"
    Header always set Access-Control-Max-Age "3600"

    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^(.*)$ $1 [R=200,L]


    # Forward real client IP to backend
    RequestHeader set X-Forwarded-For "expr=%{REMOTE_ADDR}"
    RequestHeader set X-Real-IP "expr=%{REMOTE_ADDR}"

    # Security headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    # Content Security Policy: restrict sources to trusted origins
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.socket.io https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' wss://quizthespire.com https://quizthespire.com; img-src 'self' data: https:; frame-ancestors 'self'"
    # Permissions Policy: disable powerful features by default
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()"

    ErrorLog ${APACHE_LOG_DIR}/quizthespire-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/quizthespire-ssl-access.log combined
    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/quizthespire.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/quizthespire.com/privkey.pem
</VirtualHost>
</IfModule>
 
