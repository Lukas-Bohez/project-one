<VirtualHost *:80>
    ServerName quizthespire.com
    ServerAlias www.quizthespire.com localhost

    # Redirect all traffic to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    ErrorLog ${APACHE_LOG_DIR}/quizthespire-error.log
    CustomLog ${APACHE_LOG_DIR}/quizthespire-access.log combined

    # Ensure permanent redirect
    RewriteCond %{SERVER_NAME} =localhost [OR]
    RewriteCond %{SERVER_NAME} =quizthespire.com
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
